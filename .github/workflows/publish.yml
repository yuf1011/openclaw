name: Tag & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Compute version
        id: version
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%-m)
          DAY=$(date +%-d)
          TAG="v${YEAR}.${MONTH}.${DAY}"
          N=0
          while git rev-parse "$TAG" >/dev/null 2>&1; do
            N=$((N+1))
            TAG="v${YEAR}.${MONTH}.${DAY}-${N}"
          done
          VERSION="${YEAR}.${MONTH}.${DAY}"
          [ "$N" -gt 0 ] && VERSION="${VERSION}-${N}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION, tag: $TAG"

      - name: Download official package and apply fork patches
        run: |
          npm pack openclaw@latest
          tar -xzf openclaw-*.tgz
          cd package

          # Copy fork-specific scripts
          mkdir -p scripts
          cp ../scripts/patch-scoped.cjs scripts/
          cp ../scripts/patch-copilot-1m.sh scripts/

          # Apply 1m model patch to dist files
          OPENCLAW_DIST="$(pwd)/dist" SKIP_VERIFY=true bash scripts/patch-copilot-1m.sh

          # Patch package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.name = '@yuf1011/openclaw';
            pkg.version = '${{ steps.version.outputs.version }}';
            if (!pkg.files) pkg.files = [];
            if (!pkg.files.includes('scripts/')) pkg.files.push('scripts/');
            delete pkg.scripts.prepack;
            delete pkg.scripts.prepublishOnly;
            pkg.scripts.postinstall = 'node scripts/patch-scoped.cjs';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\\n');
          "

          echo "Package contents:"
          head -10 package.json

      - name: Publish to npm
        run: npm publish ./package --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "Successfully published ${{ steps.version.outputs.version }} and tagged ${{ steps.version.outputs.tag }}"
