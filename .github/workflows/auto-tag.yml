name: Auto Tag

on:
  push:
    branches: [dev]

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create daily tag
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%-m)
          DAY=$(date +%-d)
          TAG="v${YEAR}.${MONTH}.${DAY}"
          N=0
          while git rev-parse "$TAG" >/dev/null 2>&1; do
            N=$((N+1))
            TAG="v${YEAR}.${MONTH}.${DAY}-${N}"
          done
          echo "Creating tag: $TAG"

          # Update package.json version (strip leading v)
          PKG_VERSION="${TAG#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${PKG_VERSION}'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${PKG_VERSION}"
          git tag "$TAG"
          git push origin dev "$TAG"
