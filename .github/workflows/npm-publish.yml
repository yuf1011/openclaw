name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - run: pnpm build

      - name: Patch for scoped package
        run: node scripts/patch-scoped.js

      - name: Verify patch
        run: grep -r '@yuf1011/openclaw' dist/ | head -5 || echo 'PATCH NOT FOUND IN DIST'

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
